<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64625C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8F7F2"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A18" letter-spacing="0.3">Brugada Syndrome Detection — ML Pipeline</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#73726C">Team Emebege · IDSC 2026</text>

  <!-- ─── ROW 1: Data ─── -->
  <!-- Step 1: Dataset -->
  <rect x="40" y="90" width="150" height="78" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <rect x="40" y="90" width="150" height="22" rx="10" fill="#378ADD"/>
  <rect x="40" y="101" width="150" height="11" fill="#378ADD"/>
  <text x="115" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Dataset</text>
  <text x="115" y="126" text-anchor="middle" font-size="10" fill="#0C447C">Brugada-HUCA</text>
  <text x="115" y="140" text-anchor="middle" font-size="10" fill="#0C447C">PhysioNet · WFDB</text>
  <text x="115" y="154" text-anchor="middle" font-size="10" fill="#0C447C">12-lead ECG · 100 Hz</text>

  <!-- Arrow 1→2 -->
  <line x1="192" y1="129" x2="228" y2="129" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2: EDA -->
  <rect x="230" y="90" width="150" height="78" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <rect x="230" y="90" width="150" height="22" rx="10" fill="#639922"/>
  <rect x="230" y="101" width="150" height="11" fill="#639922"/>
  <text x="305" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. EDA</text>
  <text x="305" y="126" text-anchor="middle" font-size="10" fill="#27500A">Class distribution</text>
  <text x="305" y="140" text-anchor="middle" font-size="10" fill="#27500A">Crosstab analysis</text>
  <text x="305" y="154" text-anchor="middle" font-size="10" fill="#27500A">12-lead ECG plots</text>

  <!-- Arrow 2→3 -->
  <line x1="382" y1="129" x2="418" y2="129" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3: Preprocessing -->
  <rect x="420" y="90" width="150" height="78" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <rect x="420" y="90" width="150" height="22" rx="10" fill="#BA7517"/>
  <rect x="420" y="101" width="150" height="11" fill="#BA7517"/>
  <text x="495" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Preprocessing</text>
  <text x="495" y="126" text-anchor="middle" font-size="10" fill="#633806">Bandpass 0.5–40 Hz</text>
  <text x="495" y="140" text-anchor="middle" font-size="10" fill="#633806">Butterworth order 4</text>
  <text x="495" y="154" text-anchor="middle" font-size="10" fill="#633806">Anomaly removal</text>

  <!-- Arrow 3→4 -->
  <line x1="572" y1="129" x2="608" y2="129" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 4: Signal Quality -->
  <rect x="610" y="90" width="250" height="78" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
  <rect x="610" y="90" width="250" height="22" rx="10" fill="#D4537E"/>
  <rect x="610" y="101" width="250" height="11" fill="#D4537E"/>
  <text x="735" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. Signal Quality Evaluation</text>
  <text x="735" y="126" text-anchor="middle" font-size="10" fill="#72243E">SNR per lead · Amplitude range</text>
  <text x="735" y="140" text-anchor="middle" font-size="10" fill="#72243E">Noise reduction % · Correlation</text>
  <text x="735" y="154" text-anchor="middle" font-size="10" fill="#72243E">PSD comparison (Brugada vs Normal)</text>

  <!-- ─── Vertical Arrow Row1 → Row2 ─── -->
  <line x1="450" y1="170" x2="450" y2="208" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── ROW 2: Features ─── -->
  <!-- Step 5: Feature Extraction -->
  <rect x="230" y="210" width="440" height="78" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
  <rect x="230" y="210" width="440" height="22" rx="10" fill="#5F5E5A"/>
  <rect x="230" y="221" width="440" height="11" fill="#5F5E5A"/>
  <text x="450" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5. Feature Extraction (per lead × patient)</text>
  <text x="320" y="248" text-anchor="middle" font-size="10" fill="#2C2C2A">RMS · STD · Amplitude range</text>
  <text x="450" y="248" text-anchor="middle" font-size="10" fill="#2C2C2A">·</text>
  <text x="580" y="248" text-anchor="middle" font-size="10" fill="#2C2C2A">ST min/std · PSD LF/HF ratio</text>
  <text x="340" y="263" text-anchor="middle" font-size="10" fill="#2C2C2A">Peak frequency · Skewness</text>
  <text x="450" y="263" text-anchor="middle" font-size="10" fill="#2C2C2A">·</text>
  <text x="560" y="263" text-anchor="middle" font-size="10" fill="#2C2C2A">Mann-Whitney U + FDR correction</text>

  <!-- Arrow Row2 → Row3 -->
  <line x1="450" y1="290" x2="450" y2="328" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── ROW 3: Cleaning + Modeling ─── -->
  <!-- Step 6: Feature Cleaning -->
  <rect x="40" y="330" width="220" height="78" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
  <rect x="40" y="330" width="220" height="22" rx="10" fill="#993556"/>
  <rect x="40" y="341" width="220" height="11" fill="#993556"/>
  <text x="150" y="346" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">6. Feature Cleaning</text>
  <text x="150" y="366" text-anchor="middle" font-size="10" fill="#4B1528">Drop corr &gt; 0.9 (std × energy)</text>
  <text x="150" y="380" text-anchor="middle" font-size="10" fill="#4B1528">Winsorization outlier handling</text>
  <text x="150" y="394" text-anchor="middle" font-size="10" fill="#4B1528">Statistical re-analysis (clean feat)</text>

  <!-- Arrow 6→7 -->
  <line x1="262" y1="369" x2="298" y2="369" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 7: Modeling -->
  <rect x="300" y="330" width="300" height="78" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <rect x="300" y="330" width="300" height="22" rx="10" fill="#534AB7"/>
  <rect x="300" y="341" width="300" height="11" fill="#534AB7"/>
  <text x="450" y="346" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">7. Modeling (4 experiments)</text>
  <text x="390" y="366" text-anchor="middle" font-size="10" fill="#26215C">CNN-Attention</text>
  <text x="510" y="366" text-anchor="middle" font-size="10" fill="#26215C">BiLSTM</text>
  <text x="390" y="380" text-anchor="middle" font-size="10" fill="#26215C">w/o SMOTE</text>
  <text x="510" y="380" text-anchor="middle" font-size="10" fill="#26215C">w/ SMOTE</text>
  <text x="450" y="394" text-anchor="middle" font-size="10" fill="#26215C">Focal Loss · Class weight · Threshold opt.</text>

  <!-- Arrow 7→8 -->
  <line x1="602" y1="369" x2="638" y2="369" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 8: Evaluation -->
  <rect x="640" y="330" width="220" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <rect x="640" y="330" width="220" height="22" rx="10" fill="#0F6E56"/>
  <rect x="640" y="341" width="220" height="11" fill="#0F6E56"/>
  <text x="750" y="346" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">8. Evaluation</text>
  <text x="750" y="366" text-anchor="middle" font-size="10" fill="#04342C">AUC · F1 · Sensitivity</text>
  <text x="750" y="380" text-anchor="middle" font-size="10" fill="#04342C">Specificity · Confusion matrix</text>
  <text x="750" y="394" text-anchor="middle" font-size="10" fill="#04342C">ROC curve · Optimal threshold</text>

  <!-- ─── Vertical Arrow Row3 → Row4 ─── -->
  <line x1="450" y1="410" x2="450" y2="448" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── ROW 4: Explainability ─── -->
  <!-- Step 9: SHAP -->
  <rect x="230" y="450" width="200" height="78" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <rect x="230" y="450" width="200" height="22" rx="10" fill="#D85A30"/>
  <rect x="230" y="461" width="200" height="11" fill="#D85A30"/>
  <text x="330" y="466" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">9. SHAP Analysis</text>
  <text x="330" y="486" text-anchor="middle" font-size="10" fill="#4A1B0C">GradientBoostingClassifier</text>
  <text x="330" y="500" text-anchor="middle" font-size="10" fill="#4A1B0C">Global feature importance</text>
  <text x="330" y="514" text-anchor="middle" font-size="10" fill="#4A1B0C">V1/V2/V3 clinical leads</text>

  <!-- Arrow 9→10 -->
  <line x1="432" y1="489" x2="468" y2="489" stroke="#64625C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 10: Grad-CAM -->
  <rect x="470" y="450" width="200" height="78" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <rect x="470" y="450" width="200" height="22" rx="10" fill="#D85A30"/>
  <rect x="470" y="461" width="200" height="11" fill="#D85A30"/>
  <text x="570" y="466" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">10. Grad-CAM (1D ECG)</text>
  <text x="570" y="486" text-anchor="middle" font-size="10" fill="#4A1B0C">Timestep saliency map</text>
  <text x="570" y="500" text-anchor="middle" font-size="10" fill="#4A1B0C">CNN-Attention focus region</text>
  <text x="570" y="514" text-anchor="middle" font-size="10" fill="#4A1B0C">Aligned by R-peak</text>

  <!-- ─── Legend ─── -->
  <rect x="40" y="550" width="820" height="56" rx="8" fill="#ECECEA" stroke="#D3D1C7" stroke-width="1"/>
  <text x="60" y="568" font-size="11" font-weight="700" fill="#2C2C2A">Legend</text>

  <rect x="120" y="557" width="12" height="12" rx="2" fill="#378ADD"/>
  <text x="138" y="568" font-size="10" fill="#2C2C2A">Data</text>

  <rect x="180" y="557" width="12" height="12" rx="2" fill="#639922"/>
  <text x="198" y="568" font-size="10" fill="#2C2C2A">Exploration</text>

  <rect x="268" y="557" width="12" height="12" rx="2" fill="#BA7517"/>
  <text x="286" y="568" font-size="10" fill="#2C2C2A">Preprocessing</text>

  <rect x="368" y="557" width="12" height="12" rx="2" fill="#5F5E5A"/>
  <text x="386" y="568" font-size="10" fill="#2C2C2A">Feature engineering</text>

  <rect x="492" y="557" width="12" height="12" rx="2" fill="#534AB7"/>
  <text x="510" y="568" font-size="10" fill="#2C2C2A">Modeling</text>

  <rect x="572" y="557" width="12" height="12" rx="2" fill="#0F6E56"/>
  <text x="590" y="568" font-size="10" fill="#2C2C2A">Evaluation</text>

  <rect x="648" y="557" width="12" height="12" rx="2" fill="#D85A30"/>
  <text x="666" y="568" font-size="10" fill="#2C2C2A">Explainability</text>

  <!-- Footnote -->
  <text x="450" y="595" text-anchor="middle" font-size="10" fill="#888780">Team Emebege · IDSC 2026 · Brugada Syndrome Detection from 12-Lead ECG</text>
</svg>
